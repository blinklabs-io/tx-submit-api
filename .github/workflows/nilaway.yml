name: nilaway
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  nilaway:
    name: nilaway
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.1 https://github.com/actions/checkout/releases/tag/v5.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 https://github.com/actions/setup-go/releases/tag/v6.4.0
        with:
          go-version: 1.25.x
      - name: install nilaway
        run: go install
          go.uber.org/nilaway/cmd/nilaway@ad240b12fb4c370017eb413f0388c71f3be8722c
      - name: run nilaway
        run: nilaway -include-pkgs "github.com/blinklabs-io/tx-submit-api" ./...
